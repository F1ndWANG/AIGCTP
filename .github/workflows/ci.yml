name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt
      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check app/ tests/ --select E9,F63,F7,F82

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    env:
      DATABASE_URL: sqlite+aiosqlite:///./test.db
      JWT_SECRET: test-secret-for-ci-only
      TESTING: "true"
      APP_ENV: testing

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt
      - name: Run tests with coverage
        run: |
          pip install -r requirements-dev.txt
          python -m pytest -q

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    env:
      PUPPETEER_SKIP_DOWNLOAD: "true"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: false  # Disabled by default — requires valid LLM_API_KEY in CI secrets.
              # Set up secrets.LLM_API_KEY and change `if: false` to `if: always()` to enable.

    steps:
      - uses: actions/checkout@v4

      - name: Build and start E2E stack
        run: |
          docker compose -f docker-compose.e2e.yml build
          docker compose -f docker-compose.e2e.yml up -d postgres redis backend frontend

      - name: Wait for services
        run: |
          timeout 60 sh -c 'until curl -sf http://localhost:8000/health; do sleep 2; done'
          timeout 60 sh -c 'until curl -sf http://localhost:3000; do sleep 2; done'

      - name: Run Playwright tests
        run: |
          docker compose -f docker-compose.e2e.yml run --rm e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v

  loadtest-smoke:
    name: Load Test (Smoke)
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: |
          docker compose -f docker-compose.yml up -d backend redis
          timeout 60 sh -c 'until curl -sf http://localhost:8000/health; do sleep 2; done'

      - name: Run k6 smoke test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: loadtest/smoke.ts
          flags: --vus 1 --iterations 1

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.yml down -v
