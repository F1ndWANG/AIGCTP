# ── Secrets template ────────────────────────────────────────────
# Apply with:
#   kubectl create secret generic aigctp-secrets \
#     --namespace aigctp \
#     --from-literal=postgres-password='...' \
#     --from-literal=jwt-secret='...' \
#     --from-literal=llm-api-key='...'
#
# Never commit real secrets to git. Use external-secrets, sealed-secrets,
# or your cloud provider's secret store in production.
---
apiVersion: v1
kind: Secret
metadata:
  name: aigctp-secrets
  namespace: aigctp
  labels:
    app.kubernetes.io/name: aigctp
type: Opaque
stringData:
  # Replace with actual values (or use kubectl create secret)
  postgres-password: ""
  jwt-secret: ""
  llm-api-key: ""
  sentry-dsn: ""
