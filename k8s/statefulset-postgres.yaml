apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: aigctp
  labels:
    app.kubernetes.io/name: aigctp
    app.kubernetes.io/component: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: lifeai
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aigctp-secrets
                  key: postgres-password
            - name: POSTGRES_DB
              value: life_recommender
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "lifeai", "-d", "life_recommender"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "lifeai", "-d", "life_recommender"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
        storageClassName: standard
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: aigctp
  labels:
    app.kubernetes.io/component: postgres
spec:
  clusterIP: None  # Headless for StatefulSet
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app.kubernetes.io/component: postgres
