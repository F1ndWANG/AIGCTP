apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: aigctp
  labels:
    app.kubernetes.io/name: aigctp
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  strategy:
    type: Recreate  # Only one worker should process at a time to avoid duplicates
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/component: worker
    spec:
      terminationGracePeriodSeconds: 120  # Let in-flight jobs finish
      containers:
        - name: worker
          image: ghcr.io/your-org/aigctp-backend:latest
          imagePullPolicy: Always
          command: ["python", "run_worker.py"]
          envFrom:
            - configMapRef:
                name: aigctp-config
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://lifeai:$(POSTGRES_PASSWORD)@postgres:5432/life_recommender"
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aigctp-secrets
                  key: jwt-secret
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aigctp-secrets
                  key: postgres-password
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aigctp-secrets
                  key: llm-api-key
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
