apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: aigctp
  labels:
    app.kubernetes.io/name: aigctp
    app.kubernetes.io/component: redis
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              protocol: TCP
          args: ["redis-server", "--appendonly", "yes", "--save", "300", "10"]
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: redisdata
              mountPath: /data
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 5
            timeoutSeconds: 3
  volumeClaimTemplates:
    - metadata:
        name: redisdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
        storageClassName: standard
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: aigctp
  labels:
    app.kubernetes.io/component: redis
spec:
  clusterIP: None  # Headless for StatefulSet
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app.kubernetes.io/component: redis
